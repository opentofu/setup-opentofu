version: 2
updates:
  - package-ecosystem: "npm"
    cooldown:
      default-days: 7
    directory: "/"
    commit-message:
      prefix: "fix(deps)"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 7
    directory: "/"
    commit-message:
      prefix: "chore(deps)"
    schedule:
      interval: "weekly"
